[build]
  command = "cd frontend && npm install && npm run build"
  functions = "backend"
  publish = "frontend/dist"

[dev]
  command = "npm run dev"
  port = 5173

[[redirects]]
  from = "/api/*"
  to = "https://medical-diagnosis-ml-production.up.railway.app/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
