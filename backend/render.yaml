services:
  - type: web
    name: medical-diagnosis-api
    runtime: python
    region: oregon
    plan: free
    pythonVersion: "3.12"
    buildCommand: pip install -r requirements.txt && python build.py
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT --timeout 120 run:app
    healthCheckPath: /api/health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "http://localhost:5173,http://localhost:3000,https://medical-diagnosis-ml-1.onrender.com,https://medical-diagnosis-ml.vercel.app"
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USE_TLS
        value: "true"
      - key: MAIL_USERNAME
        value: vanshaggarwaal11@gmail.com
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        value: vanshaggarwaal11@gmail.com
