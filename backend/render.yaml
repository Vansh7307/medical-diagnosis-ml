services:
  - type: web
    name: medical-diagnosis-api
    runtime: python
    region: oregon
    plan: free
    pythonVersion: "3.12"
    buildCommand: |
      pip install -r requirements.txt
      python -c "from app.data.dataset_loader import generate_all_datasets; generate_all_datasets()"
      python -c "from app.ml.trainer import train_all_models; train_all_models()"
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT --timeout 120 run:app
    healthCheckPath: /api/health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "http://localhost:5173,http://localhost:3000,https://frontend-green-gamma-jvjoxguk4a.vercel.app"
