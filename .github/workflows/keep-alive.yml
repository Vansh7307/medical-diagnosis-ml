name: Keep Backend Alive

# Pings the backend's health check every 10 minutes to prevent Render's free
# tier from spinning the app down after ~15 minutes of inactivity. Runs
# entirely within this repo -- unlike a third-party uptime service, this
# can't be silently auto-disabled after a string of failures. GitHub only
# disables scheduled workflows if the whole repository goes untouched for
# 60+ days, which normal use of this repo prevents.

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:          # allows manually triggering a run from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health check endpoint
        run: |
          curl -sS -o /dev/null -w "Status: %{http_code}\n" \
            --max-time 90 \
            --retry 2 --retry-delay 5 \
            https://medical-diagnosis-ml-1.onrender.com/api/health